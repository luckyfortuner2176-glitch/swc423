<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/7.22.1/video-js.css" rel="stylesheet" />
</head>
<body>
  <h1>Live Stream</h1>

  <!-- Video.js Player -->
  <video
    id="live-video"
    class="video-js vjs-default-skin"
    controls
    autoplay
    width="800"
    height="450"
  ></video>

  <script src="https://vjs.zencdn.net/7.22.1/video.min.js"></script>
  <script>
    const player = videojs('live-video', {
      fluid: true,
      liveui: true
    });

    // Replace this with your api.video playback URL
    player.src({
      src: 'YOUR_PLAYBACK_URL.m3u8',
      type: 'application/x-mpegURL'
    });
  </script>
</body>
</html>
