<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player - Pitwarriors619</title>
<link rel="stylesheet" href="style.css">

<style>
/* ==========================
   PLAYER LAYOUT
========================== */
.player-container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}

/* MOBILE STACK */
@media (max-width: 768px) {
    .player-container {
        grid-template-columns: 1fr;
    }
}

/* ==========================
   VIDEO RESPONSIVE
========================== */
.video-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 */
}

.video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
}

/* ==========================
   BET BUTTONS
========================== */
.bet-options {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.bet-options button {
    flex: 1;
    font-weight: bold;
}

.meron { background: #2ecc71; }
.wala { background: #e74c3c; }
.draw { background: #f1c40f; color: black; }

.quick-bets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 10px 0;
}

.quick-bets button {
    padding: 10px;
}

/* BALANCE */
.balance {
    font-size: 18px;
    margin-bottom: 10px;
    color: #14b8a6;
}

/* QUICK BET INLINE */
.quick-bets-inline {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    margin-bottom: 10px;
}

.quick-bets-inline button {
    padding: 6px 10px;
    font-size: 12px;
    min-width: 50px;
}

/* MAIN BET BUTTONS */
.bet-main {
    display: flex;
    gap: 10px;
}

.bet-main button {
    flex: 1;
    padding: 15px;
    font-size: 16px;
    font-weight: bold;
}

.bet-info {
    display: block;
    font-size: 12px;
    margin-top: 5px;
}
</style>

</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2>Welcome, <span class="username">Player</span></h2>

    <a href="player.html">🎮 Live Game</a>
    <a href="change-password.html">🔑 Change Password</a>
    <a href="/api/logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
    </div>

    <div class="content">

        <div class="player-container">

            <!-- VIDEO -->
            <div class="membership-card">
                <h2>Live Stream</h2>

                <div class="video-wrapper">
                    <iframe id="liveFrame"
                        src="https://embed.api.video/live/li4wiTHdydMdEvcXddSAdd3d"
                        frameborder="0"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <!-- BET PANEL -->
            <div class="membership-card">
                <h2>Bet Panel</h2>

                <div class="balance">
                    Balance: <span id="balance">0</span> pts
                </div>

                <!-- QUICK AMOUNTS (ONE LINE) -->
                <div class="quick-bets-inline">
                    <button onclick="setAmount(20)">20</button>
                    <button onclick="setAmount(30)">30</button>
                    <button onclick="setAmount(50)">50</button>
                    <button onclick="setAmount(100)">100</button>
                    <button onclick="setAmount(200)">200</button>
                    <button onclick="setAmount(300)">300</button>
                </div>

                <!-- BET BUTTONS -->
                <div class="bet-main">
                    <button id="meronBtn" class="meron" onclick="placeBet('MERON')">
                        MERON<br>
                        <span class="bet-info">0 → 0</span>
                    </button>

                    <button id="walaBtn" class="wala" onclick="placeBet('WALA')">
                        WALA<br>
                        <span class="bet-info">0 → 0</span>
                    </button>
                </div>

                <!-- OPTIONAL CUSTOM -->
                <div class="input-group">
                    <label>Custom Amount</label>
                    <input type="number" id="betAmount" placeholder="Enter amount" oninput="updateButtons()">
                </div>
            </div>

        </div>

        <!-- HISTORY -->
        <div class="membership-card">
            <h2>Game History</h2>

            <div class="table-wrapper">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>Round</th>
                            <th>Bet</th>
                            <th>Amount</th>
                            <th>Result</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"></tbody>
                </table>
            </div>
        </div>

    </div>

    <footer>
        © 2024 Pitwarriors619
    </footer>

</div>

<!-- SNACKBAR -->
<div id="snackbar"></div>

<script>
let currentUser = null;
let selectedBet = null;

// ==========================
// SESSION + BALANCE
// ==========================
async function checkSession() {
    try {
        const res = await fetch('/api/dashboard', {
            credentials: 'include'
        });

        if (res.status === 401) {
            window.location.href = '/';
            return;
        }

        const data = await res.json();
        currentUser = data;

        document.querySelectorAll('.username')
            .forEach(el => el.textContent = data.username);

        loadBalance(data.id);

    } catch (err) {
        console.error(err);
        window.location.href = '/';
    }
}

// ==========================
// LOAD BALANCE
// ==========================
async function loadBalance(userId) {
    try {
        const res = await fetch(`/api/wallet/${userId}`, {
            credentials: 'include'
        });

        const data = await res.json();
        document.getElementById('balance').textContent = data.balance || 0;

    } catch (err) {
        console.error(err);
    }
}

// ==========================
// BET LOGIC
// ==========================
function selectBet(type) {
    selectedBet = type;
    showSnackbar(`Selected ${type}`);
}

function setAmount(val) {
    document.getElementById('betAmount').value = val;
}

function placeBet() {
    const amount = Number(document.getElementById('betAmount').value);

    if (!selectedBet) return showSnackbar("Select bet type", "error");
    if (!amount || amount <= 0) return showSnackbar("Invalid amount", "error");

    const table = document.getElementById("historyTable");

    const row = `
        <tr>
            <td>${Date.now()}</td>
            <td>${selectedBet}</td>
            <td>${amount}</td>
            <td>Pending</td>
        </tr>
    `;

    table.insertAdjacentHTML("afterbegin", row);

    showSnackbar("Bet placed!");

    selectedBet = null;
    document.getElementById('betAmount').value = "";
}

// ==========================
// VIDEO AUTO REFRESH (LIVE FIX)
// ==========================
setInterval(() => {
    const iframe = document.getElementById("liveFrame");
    iframe.src = iframe.src;
}, 30000); // refresh every 30 sec

// ==========================
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
}

// ==========================
// SNACKBAR
// ==========================
function showSnackbar(msg, type="") {
    const sb = document.getElementById("snackbar");
    sb.textContent = msg;
    sb.className = "show " + type;

    setTimeout(() => {
        sb.className = sb.className.replace("show", "");
    }, 3000);
}

let selectedAmount = 0;

// ==========================
// SET AMOUNT
// ==========================
function setAmount(val) {
    selectedAmount = val;
    document.getElementById('betAmount').value = val;
    updateButtons();
}

// ==========================
// UPDATE BUTTON DISPLAY
// ==========================
function updateButtons() {
    const amount = Number(document.getElementById('betAmount').value) || 0;
    selectedAmount = amount;

    // TEMP payout logic (replace later with real odds)
    const payout = amount * 2;

    document.querySelector("#meronBtn .bet-info").textContent =
        `${amount} → ${payout}`;

    document.querySelector("#walaBtn .bet-info").textContent =
        `${amount} → ${payout}`;
}

// ==========================
// PLACE BET
// ==========================
function placeBet(type) {
    if (!selectedAmount || selectedAmount <= 0) {
        return showSnackbar("Select amount first", "error");
    }

    showSnackbar(`Bet ${type} - ${selectedAmount}`);

    // TODO: send to backend later
}
// INIT
checkSession();
</script>

</body>
</html>
