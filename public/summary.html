<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Summary Report</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<div class="sidebar" id="sidebar">
    <h2>Welcome, <span class="username">Agent</span></h2>

    <a href="admin.html">🏠 Dashboard</a>
    <a href="summary.html">📊 Summary Report</a>
    <a href="wallet-logs.html">📄 Wallet Logs</a>
    <a href="commission-logs.html">💰 Commission Logs</a>
    <a href="withdrawal.html">💸 Withdrawals</a>
</div>

<div class="main">

<div class="header">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
</div>

<div class="content">

<h2>Financial Summary</h2>

<!-- FILTER -->
<div class="filters">
    <select id="range">
        <option value="all">All Time</option>
        <option value="day">Today</option>
        <option value="week">This Week</option>
        <option value="month">This Month</option>
        <option value="year">This Year</option>
    </select>

    <button onclick="loadSummary()">Apply</button>
</div>

<!-- CARDS -->
<div class="cards-container">

    <div class="card">
        <h3>Commission Earned</h3>
        <p id="commission">0.00</p>
    </div>

    <div class="card">
        <h3>Withdrawals (Approved)</h3>
        <p id="withdrawals">0.00</p>
    </div>

    <div class="card">
        <h3>Game Points Used</h3>
        <p id="bets">0.00</p>
    </div>

    <div class="card">
        <h3>Net Earnings</h3>
        <p id="net">0.00</p>
    </div>

</div>

</div>

</div>

<script>

async function loadSummary() {
    const range = document.getElementById('range').value;

    const res = await fetch(`/api/summary?range=${range}`, {
        credentials: 'include'
    });

    if (!res.ok) return;

    const data = await res.json();

    document.getElementById('commission').innerText = Number(data.commission).toFixed(2);
    document.getElementById('withdrawals').innerText = Number(data.withdrawals).toFixed(2);
    document.getElementById('bets').innerText = Number(data.bets).toFixed(2);

    document.getElementById('net').innerText =
        (data.commission - data.withdrawals - data.bets).toFixed(2);
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
}

loadSummary();

</script>

</body>
</html>
